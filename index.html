  body { background: #0d0d1a; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 1.25rem 1rem 2rem; display: flex; flex-direction: column; align-items: center; }
  .card { background: #11111f; border-radius: 20px; padding: 1.75rem 1.5rem; width: 100%; max-width: 460px; border: 0.5px solid rgba(151,231,0,0.12); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: -80px; right: -80px; width: 220px; height: 220px; border-radius: 50%; background: rgba(151,231,0,0.05); pointer-events: none; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .logo-wrap img { height: 26px; width: auto; display: block; }
  .live-date { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); text-align: right; line-height: 1.6; }
  .hero { margin-bottom: 1.5rem; }
  .hero-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .hero-number { font-family: 'Space Mono', monospace; font-size: 80px; font-weight: 700; color: #97e700; line-height: 0.9; letter-spacing: -3px; }
  .hero-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 8px; font-weight: 300; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 0.75rem 0.625rem; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 17px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-val.accent { color: #97e700; }
  .stat-lbl { font-size: 7.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 4px; line-height: 1.4; }
  .divider { height: 0.5px; background: rgba(255,255,255,0.07); margin: 1.25rem 0; }
  .grid-section { margin-bottom: 1.25rem; }
  .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .grid-label { font-size: 8.5px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
  .grid-day { font-family: 'Space Mono', monospace; font-size: 10px; color: #97e700; font-weight: 700; }
  .year-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .year-tag { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.25); width: 32px; flex-shrink: 0; padding-top: 1px; line-height: 1; }
  .year-grid { display: flex; flex-wrap: wrap; gap: 1.5px; flex: 1; }
  .sq { width: 5px; height: 5px; border-radius: 1px; flex-shrink: 0; }
  .sq.done { background: #97e700; }
  .sq.today { background: #ffffff; border-radius: 1.5px; }
  .sq.left { background: rgba(255,255,255,0.08); }
  .legend { display: flex; gap: 12px; margin-top: 8px; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 9px; color: rgba(255,255,255,0.3); }
  .leg-dot { width: 5px; height: 5px; border-radius: 1px; flex-shrink: 0; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 8.5px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 11px; color: #97e700; font-weight: 700; }
  .bar-bg { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; background: #97e700; border-radius: 99px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .milestone { background: rgba(151,231,0,0.07); border: 0.5px solid rgba(151,231,0,0.2); border-radius: 10px; padding: 0.65rem 0.875rem; margin-top: 1rem; font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.5; }
  .milestone strong { color: #97e700; font-weight: 600; }
  .footer { margin-top: 1.25rem; display: flex; justify-content: space-between; align-items: flex-end; }
  .motto { font-size: 10.5px; color: rgba(255,255,255,0.22); font-style: italic; line-height: 1.4; max-width: 200px; }
  .motto em { color: rgba(151,231,0,0.5); font-style: normal; }
  .timeline { font-family: 'Space Mono', monospace; font-size: 8px; color: rgba(255,255,255,0.18); text-align: right; line-height: 1.6; }
  .share-btn { display: block; width: 100%; max-width: 460px; margin-top: 12px; padding: 0.75rem; background: rgba(151,231,0,0.08); border: 0.5px solid rgba(151,231,0,0.2); border-radius: 12px; color: rgba(151,231,0,0.8); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; letter-spacing: 0.03em; }
  .share-btn:active { opacity: 0.7; }
  .hint { text-align: center; margin-top: 10px; font-size: 9.5px; color: rgba(255,255,255,0.12); letter-spacing: 0.05em; }
</style>
</head>

<script>
(function(){
  var start=new Date(2024,9,15),total=1826;
  var now=new Date(); now.setHours(0,0,0,0);
  var elapsed=Math.floor((now-start)/864e5);
  elapsed=Math.max(0,Math.min(elapsed,total));
  var remaining=total-elapsed,pct=(elapsed/total*100).toFixed(1),weeks=Math.floor(remaining/7);
  var wd=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  var mo=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  var d=new Date();
  document.getElementById('liveDate').textContent=wd[d.getDay()]+', '+d.getDate()+' '+mo[d.getMonth()]+'. '+d.getFullYear();
  document.getElementById('dayNum').textContent=elapsed;
  document.getElementById('s1').textContent=elapsed.toLocaleString('pt-BR');
  document.getElementById('s2').textContent=remaining.toLocaleString('pt-BR');
  document.getElementById('s3').textContent=weeks.toLocaleString('pt-BR');
  document.getElementById('pctVal').textContent=pct+'%';
  document.getElementById('gridDay').textContent='dia '+elapsed+' de 1.826';
  setTimeout(function(){document.getElementById('barFill').style.width=pct+'%';},200);

  var years=[
    {year:2024,days:77},
    {year:2025,days:365},
    {year:2026,days:365},
    {year:2027,days:365},
    {year:2028,days:366},
    {year:2029,days:288}
  ];
  var container=document.getElementById('yearGrid');
  var globalDay=0;
  years.forEach(function(y){
    var row=document.createElement('div');
    row.className='year-row';
    var tag=document.createElement('div');
    tag.className='year-tag';
    tag.textContent=y.year;
    var grid=document.createElement('div');
    grid.className='year-grid';
    for(var i=0;i<y.days;i++){
      var sq=document.createElement('div');
      var cls='sq ';
      if(globalDay<elapsed-1) cls+='done';
      else if(globalDay===elapsed-1) cls+='today';
      else cls+='left';
      sq.className=cls;
      grid.appendChild(sq);
      globalDay++;
    }
    row.appendChild(tag);
    row.appendChild(grid);
    container.appendChild(row);
  });

  var next100=Math.ceil(elapsed/100)*100,ms=document.getElementById('milestoneBox');
  if(next100<=total){
    var dt=next100-elapsed; ms.style.display='block';
    ms.innerHTML=dt===0?'🎯 <strong>Hoje é marco!</strong> Dia '+next100+' completo — hora do relatório especial.':'📌 Próximo marco: <strong>Dia '+next100+'</strong> — faltam <strong>'+dt+' dias</strong>.';
  }
})();
